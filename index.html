<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>당근 소재명 네이밍 스튜디오</title>
<style>
:root{
 --accent:#FF6F0F;--accent-soft:#fff3ea;--accent-line:#ffd5b8;
 --ink:#10151c;--mut:#7b8794;--faint:#aab2bd;
 --bg:#f4f5f7;--card:#ffffff;--line:#ebedf1;--line2:#f1f2f5;
 --green:#1f8a55;--rad:12px;--mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,system-ui,sans-serif;
 background:var(--bg);color:var(--ink);font-size:13.5px;line-height:1.45;-webkit-font-smoothing:antialiased}
.wrap{max-width:1180px;margin:0 auto;padding:22px 20px 60px}
.lab{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700}
/* topbar */
.top{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.top h1{font-size:17px;font-weight:800;margin:0;letter-spacing:-.01em}
.top .sp{flex:1}
.seg{display:inline-flex;background:#eef0f3;border-radius:9px;padding:3px}
.seg button{border:0;background:transparent;color:var(--mut);font-weight:700;padding:6px 14px;border-radius:7px;cursor:pointer;font-size:12.5px}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 13px;font-weight:700;color:var(--ink);cursor:pointer;font-size:12.5px}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{filter:brightness(.96);color:#fff}
.btn.changed{background:var(--accent-soft);border-color:var(--accent-line);color:var(--accent)}
.savehint{font-size:11px;color:var(--mut)}
/* layout */
.patbar{position:sticky;top:0;z-index:50;margin-bottom:14px;box-shadow:0 3px 14px rgba(16,21,28,.06)}
.patbar .pat{font-size:16px}
.patbar-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.patbar-head h2{margin:0}
.toggle{border:1px solid var(--accent-line);background:var(--accent-soft);border-radius:999px;padding:5px 12px;font-weight:800;font-size:11px;color:var(--accent);cursor:pointer}
.toggle:hover{filter:brightness(.97)}
.toggle.on{background:var(--accent);border-color:var(--accent);color:#fff;animation:none}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(255,111,15,0)}50%{box-shadow:0 0 0 4px rgba(255,111,15,.12)}}
.totline{font-size:11.5px;font-weight:700;color:var(--ink);text-align:right;margin-top:5px;padding-top:5px;border-top:1px dashed var(--line)}
.cols{display:grid;grid-template-columns:380px 1fr;gap:16px;align-items:start}
@media(max-width:860px){.cols{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--rad);padding:16px;box-shadow:0 1px 2px rgba(16,21,28,.03)}
.card + .card{margin-top:14px}
.card h2{font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);font-weight:700;margin:0 0 12px}
/* pattern */
.pat{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1.9;word-break:break-all}
.pat .ph{background:var(--accent-soft);color:var(--accent);border:1px solid var(--accent-line);border-radius:6px;padding:2px 7px;margin:0 1px;display:inline-block}
.pat .opt{background:#f3f4f6;color:#9aa3ae;border:1px dashed #d8dce1}
.pat .sepd{color:var(--faint);font-weight:600;margin:0 1px}
.pat .ext{color:var(--faint);font-weight:600}
/* slot list */
ul.slots{list-style:none;margin:0;padding:0}
li.slot{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:8px;background:#fff;transition:border-color .15s}
li.slot:hover{border-color:#dfe2e7}
li.slot{touch-action:none;cursor:grab}
li.slot.lift{box-shadow:0 10px 26px rgba(16,21,28,.16);border-color:#e0e3e8;background:#fff;position:relative;z-index:30;cursor:grabbing}
li.slot.off{opacity:.5}
body.dragging{user-select:none;cursor:grabbing}
.grip{color:#cfd5dc;cursor:grab;font-size:14px;line-height:1;letter-spacing:-2px}
.ord{min-width:18px;height:18px;border-radius:50%;background:#eef0f3;color:#69727d;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center}
.slot .nm{font-weight:700}
.slot .req{margin-left:auto;display:inline-flex;background:#eef0f3;border-radius:7px;padding:2px}
.slot .req button{border:0;background:transparent;font-size:10.5px;font-weight:700;color:var(--mut);padding:3px 7px;border-radius:5px;cursor:pointer}
.slot .req button.on{background:#fff;color:var(--ink);box-shadow:0 1px 1px rgba(0,0,0,.07)}
.sw{position:relative;width:34px;height:20px;flex:none;cursor:pointer}
.sw input{display:none}
.sw i{position:absolute;inset:0;background:#d7dbe1;border-radius:20px;transition:.18s}
.sw i:before{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.18s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.sw input:checked + i{background:var(--accent)}.sw input:checked + i:before{left:16px}
.hint{font-size:11.5px;color:var(--mut);margin-top:10px;line-height:1.6}
/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin:-2px 0 14px}
.tabs button{border:0;background:transparent;padding:9px 12px;font-weight:700;color:var(--mut);cursor:pointer;font-size:12.5px;border-bottom:2px solid transparent;margin-bottom:-1px}
.tabs button.on{color:var(--accent);border-bottom-color:var(--accent)}
.panel{display:none}.panel.on{display:block}
/* preview table */
.search{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px;font-size:13px;outline:none}
.search:focus{border-color:var(--accent)}
.cnt{font-size:11.5px;color:var(--mut);margin:9px 2px}
.tbl{max-height:560px;overflow:auto;border:1px solid var(--line2);border-radius:10px}
table{width:100%;border-collapse:collapse}
th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line2);vertical-align:middle}
th{position:sticky;top:0;background:#fafbfc;font-size:10.5px;color:var(--mut);z-index:1}
tr:last-child td{border-bottom:0}
td.src{color:var(--mut);font-size:11.5px;font-family:var(--mono);max-width:340px;word-break:break-all}
td.out{color:var(--green);font-weight:700;font-family:var(--mono);font-size:12px;word-break:break-all}
td.n{color:var(--faint);text-align:center;font-size:11px}
/* vocab editor */
.vgroup{margin-bottom:16px}
.vgroup .gt{font-weight:800;font-size:12.5px;margin:0 0 8px;display:flex;align-items:center;gap:8px}
.vgroup .gt span{font-size:10.5px;color:var(--faint);font-weight:700}
.vrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;align-items:center;margin-bottom:6px}
.vrow .mean{color:var(--mut);font-size:12px}
.vrow input{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-family:var(--mono);font-size:12px;outline:none}
.vrow input:focus{border-color:var(--accent)}
.vhead{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:10px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
/* coverage */
.cov{margin-bottom:14px}
.cov .ct{font-weight:800;font-size:12.5px;margin:0 0 8px}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.bar .k{width:96px;font-size:11.5px;color:var(--ink);font-family:var(--mono)}
.bar .track{flex:1;background:#eef0f3;border-radius:6px;height:14px;overflow:hidden}
.bar .fill{height:100%;background:var(--accent);border-radius:6px}
.bar.fb .fill{background:#cfd5dc}
.bar .v{width:74px;text-align:right;font-size:11px;color:var(--mut)}
/* prompt */
textarea.prompt{width:100%;height:430px;border:1px solid var(--line);border-radius:10px;padding:12px;font-family:var(--mono);font-size:11.5px;line-height:1.55;color:#243;resize:vertical;background:#fcfcfd;outline:none}
textarea.prompt:focus{border-color:var(--accent)}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#10151c;color:#fff;padding:10px 16px;border-radius:10px;font-size:12.5px;font-weight:700;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style></head>
<body><div class="wrap">
 <div class="top">
   <h1>소재명 네이밍 스튜디오</h1>
   <span class="sp"></span>
   <span class="savehint" id="savehint" style="display:none">내보내기 클릭하고 파일을 공유해주세요</span>
   <button class="btn" id="exportBtn">내보내기</button>
   <button class="btn" id="importBtn">가져오기</button>
   <button class="btn" id="reset">초기화</button>
   <button class="btn primary" id="copyTop">프롬프트 복사</button>
 </div>
 <div class="patbar card">
   <div class="patbar-head"><button class="toggle" id="shortBtn">짧게 표기해요</button></div>
   <div class="pat" id="pat"></div>
   <div class="hint">실제 소재 1개에 현재 규칙을 적용한 예시입니다. 슬롯을 드래그해 순서를 바꿔보세요. <b>선택</b> 슬롯·빈 코드(매체 master, 구분 없음)는 자동 생략됩니다.</div>
 </div>
 <div class="cols">
   <div class="left">
     <div class="card">
       <h2>슬롯 순서 · 필수/선택 · 포함</h2>
       <ul class="slots" id="slots"></ul>
     </div>
   </div>
   <div class="right card">
     <div class="tabs" id="tabs">
       <button data-t="prev" class="on">미리보기</button>
       <button data-t="code">코드 사전</button>
       <button data-t="prompt">프롬프트</button>
     </div>
     <div class="panel on" id="p-prev">
       <input class="search" id="q" placeholder="검색어를 입력하세요">
       <div class="tbl"><table><thead><tr><th>원본 소재명</th><th>표준 적용 (실시간)</th><th>변형</th></tr></thead><tbody id="rows"></tbody></table></div>
     </div>
     <div class="panel" id="p-code"><div id="vocab"></div>
       <div class="hint">표기명(FULL)·축약(SHORT)을 직접 고치면 위 미리보기와 프롬프트에 즉시 반영됩니다. 비워두면 그 값은 파일명에서 생략됩니다.</div>
     </div>
     <div class="panel" id="p-prompt">
       <textarea class="prompt" id="prompt" readonly></textarea>
       <div style="margin-top:10px"><button class="btn primary" id="copyBtn">이 프롬프트 복사</button></div>
     </div>
   </div>
 </div>
</div>
<div class="toast" id="toast">복사되었습니다</div>
<input type="file" id="importFile" accept=".txt,.naming" style="display:none">

 if(diffs){diffs.split('~').forEach(function(e){if(!e)return;var c=e.split(':');var ai=+c[0][0],vi=+c[0][1];var ax=VAXES[ai];if(ax===undefined)return;var vk=Object.keys(DEF_VOCAB[ax])[vi];if(vk===undefined)return;vocab[ax][vk]=[decodeURIComponent(c[1]||''),decodeURIComponent(c[2]||'')];});}
 mode=(md==='S')?'short':'full';return true;
}
function saveLocal(){try{localStorage.setItem('namingStudio2',enc())}catch(_){}updateDirty();}
function loadLocal(){try{var s=localStorage.getItem('namingStudio2');if(s)return dec(s);}catch(_){}return false;}
const DEF_ORDER=DEF_SLOTS.map(function(s){return SKEYS.indexOf(s.key)}).join('');
const DEF_REQ=SKEYS.map(function(k){var s=DEF_SLOTS.find(function(x){return x.key===k});return s.req?'E':'S'}).join('');
const DEF_ON='OOOOOOOOO';
function isDirty(){var c=enc().split('/');return !(c[1]===DEF_ORDER&&c[2]===DEF_REQ&&c[3]===DEF_ON&&(c[5]||'')==='');}
function updateDirty(){var d=isDirty();var b=document.getElementById('exportBtn');if(b)b.classList.toggle('changed',d);var h=document.getElementById('savehint');if(h)h.style.display=d?'inline':'none';}
function toast(msg){var tt=document.getElementById('toast');tt.textContent=msg||'완료';tt.classList.add('show');clearTimeout(window.__tt);window.__tt=setTimeout(function(){tt.classList.remove('show')},1500);}
function clone(o){return JSON.parse(JSON.stringify(o))}
function ext(r){const p=r.rep.split('.');return p[p.length-1].toLowerCase()}
function code(k,val){const e=vocab[k]&&vocab[k][val];if(!e)return String(val||'');return mode==='full'?e[0]:e[1]}
function tokenFor(s,r){
 const k=s.key;
 if(!s.vocab){let v=r[k]||'';if(v)return v;return (s.req&&(k==='res'||k==='date'))?'NA':'';}
 return code(k,r[k]); // empty => omit
}
function buildName(r){let p=[];for(const s of slots){if(!s.on)continue;const t=tokenFor(s,r);if(t)p.push(t);}return p.join('_')+'.'+ext(r);}

function renderPat(){
 const r=EXAMPLE;let html=[];let first=true;
 for(const s of slots){if(!s.on)continue;const tk=tokenFor(s,r);if(!tk)continue;
   if(!first)html.push('<span class="sepd">_</span>');first=false;
   html.push(`<span class="ph ${s.req?'':'opt'}">${esc(tk)}</span>`);
 }
 html.push('<span class="ext">.'+ext(r)+'</span>');
 document.getElementById('pat').innerHTML=html.join('');
}
function renderSlots(){
 const ul=document.getElementById('slots');ul.innerHTML='';
 slots.forEach((s,i)=>{
   const li=document.createElement('li');li.className='slot'+(s.on?'':' off');li.dataset.k=s.key;
   li.innerHTML=`<span class="ord">${i+1}</span><span class="grip">⠿</span>
     <span class="nm">${s.label}</span>
     <span class="req"><button data-r="1" class="${s.req?'on':''}">필수</button><button data-r="0" class="${s.req?'':'on'}">선택</button></span>
     <label class="sw"><input type="checkbox" ${s.on?'checked':''}><i></i></label>`;
   li.querySelectorAll('.req button').forEach(b=>b.onclick=()=>{s.req=b.dataset.r==='1';renderAll()});
   li.querySelector('.sw input').onchange=e=>{s.on=e.target.checked;renderAll()};
   li.addEventListener('pointerdown',e=>startDrag(e,li,i));
   ul.appendChild(li);
 });
}
const GAP=8;let dragSt=null;
function startDrag(e,li,idx){
 if(e.button&&e.button!==0)return;
 if(e.target.closest('.req,.sw'))return;
 const ul=document.getElementById('slots');const items=[...ul.children];
 const step=li.offsetHeight+GAP;
 dragSt={li,idx,cur:idx,startY:e.clientY,step,items,started:false,pid:e.pointerId};
 window.addEventListener('pointermove',onMove,{passive:false});
 window.addEventListener('pointerup',onUp,{once:true});
 window.addEventListener('pointercancel',onUp,{once:true});
}
function beginDrag(){
 const{li,items}=dragSt;dragSt.started=true;
 document.body.classList.add('dragging');li.classList.add('lift');
 try{li.setPointerCapture(dragSt.pid);}catch(_){}
 items.forEach(n=>{if(n!==li)n.style.transition='transform .2s cubic-bezier(.2,.8,.25,1)';});
}
function onMove(e){
 if(!dragSt)return;
 const{li,idx,startY,step,items}=dragSt;const dy=e.clientY-startY;
 if(!dragSt.started){if(Math.abs(dy)<4)return;beginDrag();}
 e.preventDefault();
 li.style.transform=`translateY(${dy}px) scale(1.025)`;
 const target=Math.max(0,Math.min(items.length-1,Math.round(idx+dy/step)));
 if(target!==dragSt.cur){
   dragSt.cur=target;
   items.forEach((n,i)=>{if(n===li)return;let sh=0;
     if(idx<target&&i>idx&&i<=target)sh=-step;
     else if(idx>target&&i<idx&&i>=target)sh=step;
     n.style.transform=sh?`translateY(${sh}px)`:'';});
 }
}
function onUp(){
 if(!dragSt)return;
 window.removeEventListener('pointermove',onMove);
 if(!dragSt.started){dragSt=null;return;}
 const{li,idx,step,items}=dragSt;const target=dragSt.cur;
 li.style.transition='transform .2s cubic-bezier(.2,.8,.25,1)';
 li.style.transform=`translateY(${(target-idx)*step}px) scale(1)`;
 setTimeout(()=>{
   const m=slots.splice(idx,1)[0];slots.splice(target,0,m);
   items.forEach(n=>{n.style.transition='';n.style.transform='';});
   li.classList.remove('lift');document.body.classList.remove('dragging');
   dragSt=null;renderAll();
 },200);
}
function curData(){const q=(document.getElementById('q').value||'').trim().toLowerCase();if(!q)return DATA;return DATA.filter(r=>(r.rep+' '+r.svc+' '+r.aud+' '+r.ch+' '+r.theme).toLowerCase().includes(q));}
function renderRows(){
 const d=curData();
 document.getElementById('rows').innerHTML=d.map(r=>`<tr><td class="src">${esc(r.rep)}</td><td class="out">${esc(buildName(r))}</td><td class="n">${r.n>1?'×'+r.n:''}</td></tr>`).join('');
}
function esc(s){return s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function renderVocab(){
 const box=document.getElementById('vocab');box.innerHTML='';
 [['aud','타겟'],['seg','구분'],['svc','서비스'],['ch','매체'],['typ','유형']].forEach(([k,lab])=>{
   const g=document.createElement('div');g.className='vgroup';
   let rows=`<div class="vhead"><div>의미</div><div>FULL 표기</div><div>SHORT 표기</div></div>`;
   for(const v in vocab[k]){
     rows+=`<div class="vrow"><div class="mean">${MEAN[k][v]||v}</div>
       <input data-k="${k}" data-v="${v}" data-i="0" value="${vocab[k][v][0]}" placeholder="(생략)">
       <input data-k="${k}" data-v="${v}" data-i="1" value="${vocab[k][v][1]}" placeholder="(생략)"></div>`;
   }
   g.innerHTML=`<div class="gt">${lab} <span>${k}</span></div>`+rows;box.appendChild(g);
 });
 box.querySelectorAll('input').forEach(inp=>inp.oninput=()=>{vocab[inp.dataset.k][inp.dataset.v][+inp.dataset.i]=inp.value.trim();renderPreviewAndPrompt()});
}
function renderCov(){
 const box=document.getElementById('cov');box.innerHTML='';const N=DATA.length;
 [['svc','서비스',['biz','jobs','realty','branding','fleamarket','group','car','etc']],
  ['aud','타겟',['boss','user','all']],
  ['ch','매체',['meta','localads','naver','moloco','google','toss','owned','applovin','kakao','master']],
  ['typ','유형',['vid','img']],
  ['seg','구분',['maugrowth','none']]].forEach(([k,lab,order])=>{
   const cnt={};DATA.forEach(r=>cnt[r[k]]=(cnt[r[k]]||0)+1);
   const c=document.createElement('div');c.className='cov';let h=`<div class="ct">${lab}</div>`;let sum=0;
   order.forEach(v=>{if(!cnt[v])return;sum+=cnt[v];const pct=Math.round(cnt[v]/N*100);const fb=(v==='all'||v==='etc'||v==='master'||v==='none');
     h+=`<div class="bar ${fb?'fb':''}"><div class="k">${v}</div><div class="track"><div class="fill" style="width:${pct}%"></div></div><div class="v">${cnt[v]} · ${pct}%</div></div>`});
   h+=`<div class="totline">계 ${sum} · 100%</div>`;
   c.innerHTML=h;box.appendChild(c);
 });
 const note=document.createElement('div');note.className='hint';
 note.innerHTML='회색 막대 = fallback/생략(all·etc·master·구분없음). 모든 축 합계가 '+N+'로 일치 = 모든 소재가 각 축에서 정확히 한 칸 → MECE. (gif 등 비표준 형식 4건은 표준 대상에서 제외됨)';
 box.appendChild(note);
}
function genPrompt(){
 const onslots=slots.filter(s=>s.on);
 const pat=onslots.map(s=>s.label).join('_')+'.확장자';
 const optLabels=onslots.filter(s=>!s.req).map(s=>s.label).join(', ')||'없음';
 let L=[];
 L.push('아래 규칙에 맞춰 파일명을 일괄로 바꿔줘. 정보가 없으면 표시된 fallback을 쓰고, 규칙에 안 맞으면 그대로 두고 알려줘.');
 L.push('');
 L.push('# 파일명 패턴');
 L.push(pat);
 L.push('- 선택 슬롯('+optLabels+')은 값이 있을 때만 포함');
 L.push('- 빈 코드(매체 master, 구분 없음)는 해당 칸 생략');
 L.push('- 구분자는 _ 하나, 전부 소문자, 확장자는 원본 유지');
 L.push('');
 L.push('# 슬롯 순서와 표기 ('+(mode==='full'?'FULL':'SHORT')+' 기준, 괄호=반대표기)');
 onslots.forEach((s,i)=>{
   let line=(i+1)+'. '+s.label+'('+(s.req?'필수':'선택')+')';
   if(s.vocab){const parts=[];for(const v in vocab[s.key]){const f=vocab[s.key][v][0],sh=vocab[s.key][v][1];if(f===''&&sh==='')continue;parts.push((MEAN[s.key][v]||v)+'='+(mode==='full'?f:sh)+'('+(mode==='full'?sh:f)+')');}line+=': '+parts.join(', ');}
   else if(s.key==='theme')line+=': 캠페인·소재 핵심을 camelCase로 (예: demandGen, tacoNotTaco / 한글은 간결한 명사)';
   else if(s.key==='date')line+=': YYMM 4자리 (예: 2605). 이름에 없으면 파일 생성월 사용';
   else if(s.key==='res')line+=': 가로x세로 해상도 (예: 1080x1920). 비율 금지';
   else if(s.key==='var')line+=': 에피소드/AB (ep1, a, b, c) — 같은 소재 변형일 때만';
   L.push(line);
 });
 L.push('');
 L.push('# 제외 (이름 변경 대상 아님)');
 L.push('촬영 원본·푸티지·텍스처·연속 프레임·gif → 00_source/ 폴더로 분리');
 L.push('');
 L.push('# 예시');
 DATA.slice(0,3).forEach(r=>L.push(r.rep+'  →  '+buildName(r)));
 return L.join('\n');
}
function renderPreviewAndPrompt(){renderRows();document.getElementById('prompt').value=genPrompt();saveLocal();}
function renderAll(){renderPat();renderSlots();renderVocab();renderPreviewAndPrompt();}
/* events */
function setMode(m){mode=m;const b=document.getElementById('shortBtn');b.classList.toggle('on',mode==='short');b.textContent=mode==='short'?'전체 표기로 ↩':'짧게 표기해요';renderAll();}
document.getElementById('shortBtn').onclick=()=>setMode(mode==='short'?'full':'short');
document.getElementById('tabs').onclick=e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('on',x===b));['prev','code','prompt'].forEach(t=>document.getElementById('p-'+t).classList.toggle('on',t===b.dataset.t));};
document.getElementById('q').oninput=renderRows;
document.getElementById('reset').onclick=()=>{slots=clone(DEF_SLOTS);vocab=clone(DEF_VOCAB);setMode('full');};
function copy(txt){try{navigator.clipboard&&navigator.clipboard.writeText(txt)}catch(_){}toast('복사되었습니다');}
document.getElementById('copyBtn').onclick=()=>copy(genPrompt());
document.getElementById('copyTop').onclick=()=>copy(genPrompt());
document.getElementById('exportBtn').onclick=()=>{const b=new Blob([enc()],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='소재명규칙_설정.txt';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1500);toast('설정 파일을 저장했어요');};
document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
document.getElementById('importFile').onchange=e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();rd.onload=()=>{if(dec((rd.result||'').trim())){saveLocal();setMode(mode);toast('설정을 불러왔어요');}else{toast('형식이 올바르지 않아요');}};rd.readAsText(f);e.target.value='';};
loadLocal();setMode(mode);
</script></body></html>
